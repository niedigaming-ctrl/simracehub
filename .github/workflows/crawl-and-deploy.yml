name: Crawl prices & deploy

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 4,16 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Crawler ausführen
        run: node crawl-products.mjs sources.json
        continue-on-error: true

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain products-live.json)" ]; then
            git add products-live.json
            git commit -m "chore(crawl): update live data [skip ci]"
            git push
          fi

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          force_orphan: true
