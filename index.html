<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SimRaceHub · Sim Racing Kaufberatung & Preisvergleich</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  html, body { margin:0; padding:0; background:#0a0a0a; color:#fafafa; font-family:'Inter',system-ui,sans-serif; }
  :root { --accent-color: #ff2d2d; }
  ::selection { background: var(--accent-color); color:#0a0a0a; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script src="products.js"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="listing.jsx"></script>
<script type="text/babel" src="features.jsx"></script>

<script>
  // Live-Daten-Overlay: lädt products-live.json falls vorhanden und merged
  // Preise + Bilder + Ratings in window.SIMRACING_DATA. Stiller Fallback wenn
  // die Datei (noch) nicht da ist — Crawler wurde noch nicht ausgeführt.
  window.__liveDataReady = fetch('products-live.json', { cache: 'no-cache' })
    .then(r => r.ok ? r.json() : null)
    .then(live => { if (live) window.applyLiveData(live); return live; })
    .catch(() => null);
</script>

<script type="text/babel" data-presets="env,react">
  const { useTweaks, TweaksPanel, TweakSection, TweakColor, Listing, FeatureOverlay } = window;

  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "accent": "#ff2d2d"
  }/*EDITMODE-END*/;

  function App() {
    const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
    const [liveStatus, setLiveStatus] = React.useState(null);
    React.useEffect(() => {
      document.documentElement.style.setProperty('--accent-color', t.accent);
    }, [t.accent]);
    React.useEffect(() => {
      window.__liveDataReady?.then(live => {
        setLiveStatus(live ? { ok: live.okCount, fail: live.failCount, ts: live.generatedAt } : { error: true });
      });
    }, []);

    return (
      <>
        <Listing />
        <FeatureOverlay />
        <TweaksPanel title="Tweaks">
          <TweakSection title="Akzentfarbe" hint="Wirkt überall in der Seite.">
            <TweakColor
              label="Accent"
              value={t.accent}
              onChange={v => setTweak('accent', v)}
              options={['#ff2d2d','#ff7a00','#00d97e','#3b82f6','#a855f7','#fafafa']}
            />
          </TweakSection>
        </TweaksPanel>
      </>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
